$kind: http-request
url: "{{envoy_base_url}}/v1/chat/completions"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "model": "Model-A",
      "messages": [
        {"role": "user", "content": "Hello, which model am I talking to?"}
      ]
    }
order: 5000
